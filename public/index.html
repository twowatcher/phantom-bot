<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PHANTOM Bot - Painel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-8">
    <div class="flex justify-between items-center mb-10">
      <h1 class="text-5xl font-bold flex items-center gap-3">
        👻 PHANTOM <span class="text-purple-400">BOT</span>
      </h1>
      <button onclick="logout()" id="logout-btn" class="hidden px-6 py-3 bg-red-600 rounded-2xl">Sair</button>
    </div>

    <div id="login-screen">
      <button onclick="login()" class="w-full max-w-md mx-auto block bg-indigo-600 py-6 text-xl rounded-3xl hover:bg-indigo-700">
        Entrar com Discord
      </button>
    </div>

    <div id="dashboard" class="hidden">
      <h2 class="text-3xl mb-8">Seus Servidores</h2>
      <div id="server-list" class="grid md:grid-cols-2 gap-6"></div>
    </div>
  </div>

  <script>
    let currentGuild = null;

    function login() {
      window.location.href = '/login';
    }

    function logout() {
      window.location.href = '/logout';
    }

    async function loadServers() {
      const res = await fetch('/api/servers');
      const servers = await res.json();

      const container = document.getElementById('server-list');
      container.innerHTML = '';

      servers.forEach(s => {
        const div = document.createElement('div');
        div.className = "bg-zinc-900 p-6 rounded-3xl cursor-pointer hover:scale-105 transition";
        div.innerHTML = `
          <h3 class="font-bold text-xl">${s.name}</h3>
          <button onclick="openWelcomeEditor('${s.id}', '${s.name}')" class="mt-4 w-full bg-purple-600 py-3 rounded-2xl">
            Editar Welcome
          </button>
        `;
        container.appendChild(div);
      });
    }

    function openWelcomeEditor(guildId, guildName) {
      currentGuild = guildId;
      alert(`🔧 Editando Welcome do servidor: ${guildName}\n\n(Em breve formulário completo com cor, imagem, texto)`);
      // Aqui vamos expandir futuramente
    }

    // Carregar ao abrir
    window.onload = () => {
      fetch('/api/me').then(r => {
        if (r.ok) {
          document.getElementById('login-screen').classList.add('hidden');
          document.getElementById('dashboard').classList.remove('hidden');
          document.getElementById('logout-btn').classList.remove('hidden');
          loadServers();
        }
      });
    };
  </script>
</body>
</html>
